name: CD — Déploiement Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Validation CI avant déploiement
  # ─────────────────────────────────────────────
  gate:
    name: Gate CI (tests obligatoires)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installer les dépendances backend
        run: npm ci
        working-directory: server

      - name: Tests SaaS (gate obligatoire)
        run: npm run test:saas
        working-directory: server
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use

  # ─────────────────────────────────────────────
  # Build frontend
  # ─────────────────────────────────────────────
  build-client:
    name: Build Client React
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: client

      - name: Build de production
        run: npm run build
        working-directory: client
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false

      - name: Upload artifact du build
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Déploiement Railway (backend)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: gate
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://erp-commercial-comptable-senegal-production.up.railway.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Railway CLI
        run: npm install -g @railway/cli

      - name: Déployer sur Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Vérifier le health-check
        run: |
          sleep 30
          curl -f https://erp-commercial-comptable-senegal-production.up.railway.app/api/health \
            || (echo "Health check échoué" && exit 1)

  # ─────────────────────────────────────────────
  # Déploiement Vercel (frontend)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: [gate, build-client]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://erp-gescom-senegal.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger le build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: client/build/

      - name: Installer Vercel CLI
        run: npm install -g vercel

      - name: Déployer sur Vercel (production)
        run: |
          cd client
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────
  # Notification de déploiement
  # ─────────────────────────────────────────────
  notify:
    name: Notification
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Résumé du déploiement
        run: |
          echo "## Résumé déploiement" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Railway** : ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Vercel** : ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Déclenché par** : ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
