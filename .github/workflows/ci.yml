name: CI — Tests & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Tests backend Jest
  # ─────────────────────────────────────────────
  test-backend:
    name: Tests Backend (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: server

      - name: Tests SaaS (tenantIsolation + services)
        run: npm run test:saas
        working-directory: server
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use
          MONGODB_URI: ''

      - name: Tests unitaires (services)
        run: npm run test:unit
        working-directory: server
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use

  # ─────────────────────────────────────────────
  # Job 2 : Build frontend React
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: client

      - name: Build de production
        run: npm run build
        working-directory: client
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://erp-commercial-comptable-senegal-production.up.railway.app/api' }}
          CI: false

      - name: Vérifier la taille du bundle
        run: |
          du -sh build/
          echo "Build réussi — bundle prêt pour déploiement"
        working-directory: client

  # ─────────────────────────────────────────────
  # Job 3 : Lint backend
  # ─────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: server

      - name: ESLint
        run: npm run lint
        working-directory: server
        continue-on-error: true
