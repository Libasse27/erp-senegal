# =============================================================================
# ERP Commercial & Comptable Sénégal — Configuration Nginx
# Reverse proxy production : HTTP→HTTPS + SSL/TLS + HTTP/2 + Sécurité
# =============================================================================

# Nombre de workers = auto (1 par cœur CPU disponible)
worker_processes auto;

# Niveau de log : warn en prod (évite les logs excessifs)
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;       # multiplexage performant sous Linux
    multi_accept       on;          # accepte plusieurs connexions par itération
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logs
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance réseau
    # -------------------------------------------------------------------------
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    server_tokens  off;    # masque la version Nginx dans les headers

    # -------------------------------------------------------------------------
    # Upstreams (DNS Docker interne)
    # -------------------------------------------------------------------------
    upstream backend {
        server    backend:5000;
        keepalive 32;              # pool de connexions persistantes vers le backend
    }

    upstream frontend {
        server    frontend:80;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Rate limiting — par adresse IP
    # -------------------------------------------------------------------------
    # Zone API générale : 30 req/s, 10 Mo de mémoire (~160 000 IPs)
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    # Zone login : 5 req/min — protection brute-force
    limit_req_zone  $binary_remote_addr zone=login:10m  rate=5r/m;
    # Limite de connexions simultanées par IP
    limit_conn_zone $binary_remote_addr zone=conn_ip:10m;

    # -------------------------------------------------------------------------
    # Compression Gzip
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;          # ne compresse pas les très petites réponses
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # =========================================================================
    # SERVEUR 1 — HTTP :80 → redirection HTTPS + défi Let's Encrypt
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Chemin de validation Let's Encrypt (Certbot HTTP-01 challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tout le reste → HTTPS permanent (301)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # SERVEUR 2 — HTTPS :443 (SSL + HTTP/2)
    # =========================================================================
    server {
        listen 443 ssl;
        http2  on;                 # HTTP/2 (syntaxe Nginx ≥ 1.25)
        server_name _;

        # ---------------------------------------------------------------------
        # Certificats SSL
        # ---------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ---------------------------------------------------------------------
        # Protocoles et chiffrement — niveau "Modern" (Mozilla SSL Config v5)
        # ---------------------------------------------------------------------
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Session SSL — améliore les performances (évite le handshake complet)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;   # désactivé pour la forward secrecy

        # OCSP Stapling — validation du certificat sans requête CA externe
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ---------------------------------------------------------------------
        # Limites et timeouts
        # ---------------------------------------------------------------------
        client_max_body_size 10M;
        limit_conn conn_ip 20;     # max 20 connexions simultanées par IP

        # ---------------------------------------------------------------------
        # En-têtes de sécurité HTTP
        # ---------------------------------------------------------------------

        # HSTS : force HTTPS pendant 2 ans, inclut les sous-domaines
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Anti-clickjacking : l'app ne peut pas être chargée dans une iframe externe
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Interdit au navigateur de deviner le Content-Type
        add_header X-Content-Type-Options "nosniff" always;

        # Filtre XSS des anciens navigateurs
        add_header X-XSS-Protection "1; mode=block" always;

        # Contrôle de l'URL de référence transmise
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Accès aux fonctionnalités navigateur : caméra/micro/géoloc désactivés
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Content Security Policy :
        #   - Scripts/styles uniquement depuis l'origine
        #   - Images : origine + data: (logos base64) + blob: (aperçu PDF)
        #   - WebSocket ws:/wss: pour Socket.io (notifications temps réel)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:;" always;

        # ---------------------------------------------------------------------
        # Location 1 — Login : rate limiting renforcé (brute-force)
        # Doit être déclaré AVANT /api/ (Nginx prend la correspondance la plus
        # longue en premier)
        # ---------------------------------------------------------------------
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------------------------
        # Location 2 — API REST
        # ---------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Headers nécessaires au handshake WebSocket si un appel API l'initie
            proxy_set_header Upgrade          $http_upgrade;
            proxy_set_header Connection       'upgrade';
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts : 90s pour laisser le temps à Puppeteer de générer les PDF
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    90s;
        }

        # ---------------------------------------------------------------------
        # Location 3 — Socket.io (WebSocket — notifications temps réel)
        # ---------------------------------------------------------------------
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Upgrade obligatoire pour passer HTTP → WebSocket
            proxy_set_header Upgrade         $http_upgrade;
            proxy_set_header Connection      "upgrade";
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Connexion longue durée (86400s = 24h) pour le canal temps réel
            proxy_read_timeout 86400s;
        }

        # ---------------------------------------------------------------------
        # Location 4 — Frontend React (SPA — catch-all)
        # ---------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }
    }
}
