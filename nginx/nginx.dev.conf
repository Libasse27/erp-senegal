# =============================================================================
# ERP Commercial & Comptable Sénégal — Configuration Nginx DÉVELOPPEMENT
# HTTP uniquement (pas de SSL) — utiliser quand les certificats ne sont pas dispo.
#
# Pour passer en HTTPS, générez d'abord les certificats :
#   bash nginx/ssl/generate-ssl.sh
# Puis relancez avec la config principale (nginx.conf).
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use   epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile          on;
    keepalive_timeout 65;
    server_tokens     off;

    upstream backend  { server backend:5000;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 16; }

    limit_req_zone  $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/m;

    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/json application/javascript image/svg+xml;

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # En-têtes de sécurité (même en dev)
        add_header X-Frame-Options        "SAMEORIGIN"                  always;
        add_header X-Content-Type-Options "nosniff"                     always;
        add_header X-XSS-Protection       "1; mode=block"               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Login — rate limiting renforcé
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API REST
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # Socket.io (WebSocket)
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # Frontend React (SPA)
        location / {
            proxy_pass       http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
